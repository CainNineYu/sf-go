definitions:
  dto.AddHedgeSymbolConfigReq:
    properties:
      symbol:
        description: 交易对 必传
        type: string
    required:
    - symbol
    type: object
  dto.AddPerpHedgeSymbolConfigReq:
    properties:
      symbol:
        description: 交易对 必传
        type: string
    required:
    - symbol
    type: object
  dto.AddPerpSymbolConfigReq:
    properties:
      hostId:
        description: 服务器Id，更新的时候不能更新hostId,新增必传
        type: string
      symbol:
        description: 交易对 必传
        type: string
    required:
    - hostId
    - symbol
    type: object
  dto.AddPerpWtConfigReq:
    properties:
      hostId:
        description: 服务器Id，更新的时候不能更新hostId,新增必传
        type: string
      symbol:
