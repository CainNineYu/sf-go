        type: string
      symbol:
        description: 交易对 必传
        type: string
    required:
    - hostId
    - symbol
    type: object
  dto.AiCloseReq:
    properties:
      accountAi:
        type: string
      accountId:
        description: 需要下单的账户id
        type: string
      id:
        description: 请求传入的唯一记账 ID / 策略 ID（原样返回）
        type: string
      symbol:
        description: 交易币种
        type: string
    required:
    - accountAi
    - accountId
    - id
    - symbol
    type: object
  dto.AiPlaceReq:
    properties:
      accountId:
        description: 需要下单的账户id
        type: string
      action:
        description: 操作方向："LONG"（多） / "SHORT"（空）
        enum:
        - LONG
        - SHORT
        type: string
      codeAI:
        description: AI 密文“咒语”，用于防止用户转移到其他市场下单
        type: string
      entryPrice:
        description: 入场估计价格
        type: string
      id:
        description: 请求传入的唯一记账 ID / 策略 ID（原样返回）
        type: string
      leverage:
        description: 固定杠杆
        type: integer
      open:
        description: 用户是否需要开仓
        type: boolean
      posionValue:
        description: 建议仓位金额（50u-2000u）,判断最小和最大值之后的数量
        type: string
      slRate:
        description: |-
          SlPx        string `json:"stopLoss" binding:"required"`                // 止损价格
          TpPx        string `json:"takeProfit" binding:"required"`              // 止盈价格
        type: string
      symbol:
        description: 交易币种（如 X:BTCUSD → BTC，对外采用 BN 规范）
        type: string
      timestamp:
        description: Unix 毫秒时间戳，用于记账和策略记录
        type: integer
      tpRate:
        description: 止盈百分比小数
        type: string
    required:
    - accountId
    - action
    - codeAI
    - entryPrice
    - id
    - leverage
    - posionValue
    - slRate
    - symbol
    - timestamp
    - tpRate
    type: object
  dto.DeleteHedgeSymbolConfigReq:
